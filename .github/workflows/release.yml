name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create releases and push CHANGELOG commits
      issues: write         # comment on issues when released
      pull-requests: write  # comment on PRs when released
      id-token: write       # provenance for npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # semantic-release needs full git history
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Analyzes commits, bumps version, publishes to npm, creates GitHub Release,
      # and commits CHANGELOG.md + package.json back to main.
      # Requires secrets: NPM_TOKEN (npmjs.com token), GITHUB_TOKEN (auto-provided).
      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Generate TypeDoc and deploy to GitHub Pages.
      # Enable Pages in repo Settings → Pages → Source: Deploy from branch → gh-pages.
      - name: Generate documentation
        if: steps.release.outputs.new_release_published == 'true'
        run: npm run docs

      - name: Deploy documentation to GitHub Pages
        if: steps.release.outputs.new_release_published == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
